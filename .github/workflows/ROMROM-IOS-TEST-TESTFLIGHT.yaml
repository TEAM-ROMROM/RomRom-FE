                issue_number: parseInt(issueNumber),
                body: issueBody
              });
              console.log(`✅ 이슈 #${issueNumber}에도 최종 배포 완료 댓글 작성`);
            }

      # TestFlight 배포 실패 - PR 댓글 업데이트
