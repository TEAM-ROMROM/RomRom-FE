# ===================================================================
# iOS 테스트용 TestFlight 배포 워크플로우
# ===================================================================
#
# 이 워크플로우는 test-deploy 브랜치에서 수동으로 실행하여
# 테스트용 iOS 빌드를 TestFlight에 배포합니다.
#
# 주요 특징:
# - workflow_dispatch로 수동 실행만 가능
# - 버전은 version.yml의 실제 버전 사용 (빌드번호는 PR/이슈 번호 기반)
# - 빌드 번호는 GITHUB_RUN_NUMBER 사용 (절대 겹치지 않음)
# - 브랜치명에서 이슈 번호 자동 추출 (YYYYMMDD_#이슈번호_내용 형식)
# - GitHub API로 이슈 정보 가져와서 릴리즈 노트에 포함
# - CHANGELOG 로직 제거, 단순화된 릴리즈 노트 사용
#
# 브랜치명 예시:
# - 20251208_#387_내용
# - 20250115_#123_버그수정
#
# 사용 방법:
# 1. test-deploy 브랜치로 체크아웃
# 2. GitHub Actions에서 "ROMROM-IOS-TEST-TESTFLIGHT" 워크플로우 선택
# 3. "Run workflow" 버튼 클릭
#
# 릴리즈 노트 형식:
# 테스트 빌드 #123
# 브랜치: 20251208_#387_내용
# 커밋: abc1234...
# 날짜: 2025-12-08 10:30:00
# 관련 이슈:
# - #387: [이슈 제목]
# - URL: https://github.com/TEAM-ROMROM/RomRom-FE/issues/387
#
# ===================================================================

name: ROMROM-IOS-TEST-TESTFLIGHT

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-ios-app]

env:
  FLUTTER_VERSION: "3.35.5"
  XCODE_VERSION: "26.0"
  PROJECT_TYPE: "flutter"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-test-build:
    name: 테스트 빌드 준비
    runs-on: macos-26

    outputs:
      version: ${{ steps.test_version.outputs.version }}
      build_number: ${{ steps.test_version.outputs.build_number }}
      issue_url: ${{ steps.issue_info.outputs.issue_url }}
      issue_title: ${{ steps.issue_info.outputs.issue_title }}
      issue_number: ${{ steps.issue_info.outputs.issue_number }}
      branch_name: ${{ steps.issue_info.outputs.branch_name }}
      pr_number: ${{ steps.test_version.outputs.pr_number }}
      commit_hash: ${{ steps.release_notes.outputs.commit_hash }}
      progress_comment_id: ${{ steps.progress_comment.outputs.comment_id }}
      progress_start_time: ${{ steps.progress_comment.outputs.start_time }}

    steps:
      # 트리거 즉시 진행상황 댓글 생성 (모든 준비 작업 전에 먼저 댓글 달기)
      - name: 진행상황 댓글 생성
        id: progress_comment
        if: github.event_name == 'repository_dispatch' && github.event.client_payload.pr_number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt('${{ github.event.client_payload.pr_number }}');
            const runId = '${{ github.run_id }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;
            const startTime = Date.now();

            const body = [
              '## 🍎 iOS TestFlight 빌드 중...',
              '',
              '| 단계 | 상태 | 소요 시간 |',
              '|------|------|----------|',
              '| 🔧 준비 | ⏳ 진행 중... | - |',
              '| 🔨 IPA 빌드 | ⏸️ 대기 | - |',
              '| 📤 TestFlight 배포 | ⏸️ 대기 | - |',
              '',
              `📋 **[실시간 로그 보기](${runUrl})**`
            ].join('\n');

            const { data: comment } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });

            console.log(`✅ 진행상황 댓글 생성 완료 (ID: ${comment.id})`);
            core.setOutput('comment_id', comment.id.toString());
            core.setOutput('start_time', startTime.toString());

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.branch_name || github.ref }}

      - name: Pull latest changes
        run: git pull origin ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.branch_name || github.ref_name }}

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "TEST_BUILD=true" >> .env
          echo ".env file created"

      - name: Create Secrets.xcconfig file
        run: |
          mkdir -p ios/Flutter
          if [ -n "${{ secrets.SECRETS_XCCONFIG }}" ]; then
            echo "${{ secrets.SECRETS_XCCONFIG }}" > ios/Flutter/Secrets.xcconfig
            echo "Secrets.xcconfig created"
          else
            echo "// No secrets provided" > ios/Flutter/Secrets.xcconfig
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-flutter-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          cd ios && pod install

      # 테스트 빌드 버전 설정 (version.yml의 실제 버전 사용)
      - name: 테스트 빌드 버전 설정
        id: test_version
        run: |
          VERSION=$(grep '^version:' version.yml | sed 's/version:[[:space:]]*//' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # repository_dispatch 이벤트인 경우 PR 번호를 빌드 번호로 사용
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            BUILD_NUMBER="${{ github.event.client_payload.build_number }}"
            PR_NUMBER="${{ github.event.client_payload.pr_number }}"
            echo "📋 repository_dispatch 이벤트 감지"
            echo "  PR 번호: #$PR_NUMBER"
            echo "  빌드 번호: $BUILD_NUMBER (PR 번호 사용)"
          else
            BUILD_NUMBER="${{ github.run_number }}"
            PR_NUMBER=""
            echo "📋 workflow_dispatch 이벤트 감지"
            echo "  빌드 번호: $BUILD_NUMBER (기본값)"
          fi
          
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "📋 테스트 빌드: 버전=$VERSION, 빌드번호=$BUILD_NUMBER"

      # 브랜치명에서 이슈 번호 추출 및 GitHub API로 이슈 정보 가져오기
      - name: 브랜치명에서 이슈 정보 추출
        id: issue_info
        run: |
          # repository_dispatch인 경우 client_payload에서 브랜치명 가져오기
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            BRANCH_NAME="${{ github.event.client_payload.branch_name }}"
            ISSUE_NUMBER="${{ github.event.client_payload.issue_number }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
            # 브랜치명에서 이슈 번호 추출 (#387 형식) - sed 사용 (macOS/Linux 호환)
            ISSUE_NUMBER=$(echo "$BRANCH_NAME" | sed -n 's/.*#\([0-9]*\).*/\1/p')
          fi

          echo "🌿 브랜치명: $BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "⚠️ 브랜치명에서 이슈 번호를 찾을 수 없습니다."
            echo "issue_url=" >> $GITHUB_OUTPUT
            echo "issue_title=" >> $GITHUB_OUTPUT
            echo "issue_number=" >> $GITHUB_OUTPUT
          else
            echo "✅ 추출된 이슈 번호: #$ISSUE_NUMBER"
            ISSUE_URL="https://github.com/${{ github.repository }}/issues/$ISSUE_NUMBER"
            echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT
            echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT

            # GitHub API로 이슈 정보 가져오기
            echo "🔍 GitHub API로 이슈 정보 조회 중..."
            ISSUE_RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER")

            # 이슈 제목 추출
            ISSUE_TITLE=$(echo "$ISSUE_RESPONSE" | jq -r '.title // "이슈 정보 없음"')

            # 이슈 상태 확인
            ISSUE_STATE=$(echo "$ISSUE_RESPONSE" | jq -r '.state // "unknown"')

            if [ "$ISSUE_TITLE" = "null" ] || [ "$ISSUE_TITLE" = "이슈 정보 없음" ]; then
              echo "⚠️ 이슈 #$ISSUE_NUMBER를 찾을 수 없습니다."
              echo "issue_title=" >> $GITHUB_OUTPUT
            else
              echo "📋 이슈 제목: $ISSUE_TITLE"
              echo "📌 이슈 상태: $ISSUE_STATE"
              echo "issue_title=$ISSUE_TITLE" >> $GITHUB_OUTPUT
            fi
          fi

      # 릴리즈 노트 생성
      - name: 릴리즈 노트 생성
        id: release_notes
        run: |
          BUILD_NUMBER="${{ steps.test_version.outputs.build_number }}"
          BRANCH_NAME="${{ steps.issue_info.outputs.branch_name }}"
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHORT=$(echo "$COMMIT_SHA" | cut -c1-7)
          BUILD_DATE=$(date '+%Y-%m-%d %H:%M:%S')

          # commit_hash output 저장
          echo "commit_hash=$COMMIT_SHORT" >> $GITHUB_OUTPUT
          
          # 릴리즈 노트 생성
          cat > final_release_notes.txt << EOF
          테스트 빌드 #$BUILD_NUMBER
          
          브랜치: $BRANCH_NAME
          커밋: $COMMIT_SHORT
          날짜: $BUILD_DATE
          
          EOF
          
          # 이슈 정보가 있으면 추가
          if [ -n "${{ steps.issue_info.outputs.issue_number }}" ]; then
            ISSUE_NUMBER="${{ steps.issue_info.outputs.issue_number }}"
            ISSUE_TITLE="${{ steps.issue_info.outputs.issue_title }}"
            ISSUE_URL="${{ steps.issue_info.outputs.issue_url }}"
          
            cat >> final_release_notes.txt << EOF
          관련 이슈:
          - #$ISSUE_NUMBER: $ISSUE_TITLE
          - URL: $ISSUE_URL
          
          EOF
          fi
          
          echo "📋 생성된 릴리즈 노트:"
          echo "----------------------------------------"
          cat final_release_notes.txt
          echo "----------------------------------------"

      # 릴리즈 노트를 아티팩트로 업로드
      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: final_release_notes.txt
          retention-days: 1

      # 프로젝트 파일들을 아티팩트로 업로드
      - name: Upload project files
        uses: actions/upload-artifact@v4
        with:
          name: project-files
          path: |
            .env
            ios/Flutter/Secrets.xcconfig
            pubspec.yaml
            lib/
            assets/
          retention-days: 1

  build-ios-test:
    name: iOS 테스트 빌드
    runs-on: macos-26
    needs: prepare-test-build

    outputs:
      step1_elapsed: ${{ steps.progress_step1.outputs.elapsed }}
      step1_end_time: ${{ steps.progress_step1.outputs.end_time }}
      step2_elapsed: ${{ steps.progress_step2.outputs.elapsed }}
      step2_end_time: ${{ steps.progress_step2.outputs.end_time }}

    steps:
      # 진행상황 - 준비 완료 (build job 시작 시점에 업데이트해야 준비 시간이 정확히 표시됨)
      - name: 진행상황 - 준비 완료
        id: progress_step1
        if: github.event_name == 'repository_dispatch' && needs.prepare-test-build.outputs.progress_comment_id != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commentId = parseInt('${{ needs.prepare-test-build.outputs.progress_comment_id }}');
            const startTime = parseInt('${{ needs.prepare-test-build.outputs.progress_start_time }}');
            const runId = '${{ github.run_id }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            const now = Date.now();
            const elapsed = Math.round((now - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            const elapsedStr = minutes > 0 ? `${minutes}분 ${seconds}초` : `${seconds}초`;

            const body = [
              '## 🍎 iOS TestFlight 빌드 중...',
              '',
              '| 단계 | 상태 | 소요 시간 |',
              '|------|------|----------|',
              `| 🔧 준비 | ✅ 완료 | ${elapsedStr} |`,
              '| 🔨 IPA 빌드 | ⏳ 진행 중... | - |',
              '| 📤 TestFlight 배포 | ⏸️ 대기 | - |',
              '',
              `📋 **[실시간 로그 보기](${runUrl})**`
            ].join('\n');

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              body: body
            });

            console.log(`✅ 진행상황 업데이트: 준비 완료 (${elapsedStr})`);
            core.setOutput('elapsed', elapsedStr);
            core.setOutput('end_time', now.toString());

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.branch_name || github.ref }}

      - name: Pull latest changes
        run: git pull origin ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.branch_name || github.ref_name }}

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      # 프로젝트 파일들 다운로드
      - name: Download project files
        uses: actions/download-artifact@v4
        with:
          name: project-files
          path: .

      # .env 파일 확인 및 재생성
      - name: Ensure .env file exists
        run: |
          if [ ! -f .env ]; then
            echo "⚠️ .env 파일이 아티팩트에서 복원되지 않았습니다. 재생성합니다."
            echo "${{ secrets.ENV_FILE }}" > .env
            echo "TEST_BUILD=true" >> .env
          fi
          echo "✅ .env 파일 확인됨 (크기: $(wc -c < .env) bytes)"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-flutter-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          cd ios && pod install

      # Apple 인증서 설정
      - name: Import Code-Signing Certificates
        uses: Apple-Actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install Provisioning Profile
        run: |
          echo "${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          uuid=$(grep -A1 -a "UUID" profile.mobileprovision | grep string | sed -e "s/<string>//" -e "s/<\/string>//" -e "s/[[:space:]]//g")
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$uuid.mobileprovision

      # ExportOptions.plist 파일 생성
      - name: Create ExportOptions.plist
        run: |
          cd ios
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>CUK22HY6YC</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.alom.romrom</key>
                  <string>RomRom Distribution</string>
              </dict>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Create GoogleService-Info.plist (safe heredoc)
        shell: bash
        run: |
          mkdir -p ios/Runner
          cat > ios/Runner/GoogleService-Info.plist << 'PLIST'
          ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          PLIST
              echo "GoogleService-Info.plist created"
              /usr/bin/plutil -lint ios/Runner/GoogleService-Info.plist

      # Flutter build (no codesign) - version.yml 실제 버전 사용
      - name: Flutter build (no codesign)
        run: |
          flutter build ios --release --no-codesign --no-tree-shake-icons \
            --build-name="${{ needs.prepare-test-build.outputs.version }}" \
            --build-number="${{ needs.prepare-test-build.outputs.build_number }}"

      # Archive 생성 (manual signing)
      - name: Create Archive
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -archivePath build/Runner.xcarchive \
            -destination 'generic/platform=iOS' \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="RomRom Distribution" \
            CODE_SIGN_IDENTITY="Apple Distribution"

      # IPA 생성
      - name: Export IPA
        run: |
          cd ios
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

      # 빌드 메타데이터 파일 생성 (댓글 작성 워크플로우용)
      - name: Create build metadata file
        run: |
          cat > build-metadata.json << EOF
          {
            "pr_number": "${{ needs.prepare-test-build.outputs.pr_number }}",
            "build_number": "${{ needs.prepare-test-build.outputs.build_number }}",
            "issue_number": "${{ needs.prepare-test-build.outputs.issue_number }}",
            "branch_name": "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.branch_name || github.ref_name }}"
          }
          EOF
          cat build-metadata.json

      # IPA 파일을 아티팩트로 업로드
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: |
            ios/build/ipa/*.ipa
            build-metadata.json
          retention-days: 1

      # 진행상황 - 빌드 성공 (최종) - IPA 빌드 완료 즉시 최종 댓글 등록
      - name: 진행상황 - 빌드 성공 (최종)
        id: progress_step2
        if: success() && github.event_name == 'repository_dispatch' && needs.prepare-test-build.outputs.progress_comment_id != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commentId = parseInt('${{ needs.prepare-test-build.outputs.progress_comment_id }}');
            const step1EndTime = parseInt('${{ steps.progress_step1.outputs.end_time }}');
            const step1Elapsed = '${{ steps.progress_step1.outputs.elapsed }}';
            const buildNumber = '${{ needs.prepare-test-build.outputs.build_number }}';
            const version = '${{ needs.prepare-test-build.outputs.version }}';
            const branchName = '${{ needs.prepare-test-build.outputs.branch_name }}';
            const commitHash = '${{ needs.prepare-test-build.outputs.commit_hash }}';
            const runId = '${{ github.run_id }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            const now = Date.now();
            const elapsed = Math.round((now - step1EndTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            const elapsedStr = minutes > 0 ? `${minutes}분 ${seconds}초` : `${seconds}초`;

            const body = [
              '## 🍎 ✅ iOS IPA 빌드 완료! (TestFlight 배포 중...)',
              '',
              '| 단계 | 상태 | 소요 시간 |',
              '|------|------|----------|',
              `| 🔧 준비 | ✅ 완료 | ${step1Elapsed || '-'} |`,
              `| 🔨 IPA 빌드 | ✅ 완료 | ${elapsedStr} |`,
              '| 📤 TestFlight 배포 | ⏳ 진행 중... | - |',
              '',
              '### 📦 빌드 결과',
              '| 항목 | 값 |',
              '|------|-----|',
              `| **앱 버전** | \`${version}(${buildNumber})\` |`,
              `| **브랜치** | \`${branchName}\` |`,
              `| **커밋** | \`${commitHash}\` |`,
              `| **IPA 빌드 소요 시간** | ${elapsedStr} |`,
              '',
              '📤 TestFlight 배포가 진행 중입니다. 완료 후 댓글이 업데이트됩니다.',
              `🔗 **[워크플로우 실행 로그](${runUrl})**`
            ].join('\n');

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              body: body
            });

            console.log(`✅ 진행상황: IPA 빌드 성공 - 최종 댓글 즉시 등록 (${elapsedStr})`);
            core.setOutput('elapsed', elapsedStr);
            core.setOutput('end_time', now.toString());

      # 진행상황 - 빌드 실패 (최종) - IPA 빌드 실패 시 즉시 실패 댓글 등록
      - name: 진행상황 - 빌드 실패 (최종)
        if: failure() && github.event_name == 'repository_dispatch' && needs.prepare-test-build.outputs.progress_comment_id != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commentId = parseInt('${{ needs.prepare-test-build.outputs.progress_comment_id }}');
            const startTime = parseInt('${{ needs.prepare-test-build.outputs.progress_start_time }}');
            const step1EndTime = parseInt('${{ steps.progress_step1.outputs.end_time }}') || 0;
            const prNumber = parseInt('${{ github.event.client_payload.pr_number }}');
            const step1Elapsed = '${{ steps.progress_step1.outputs.elapsed }}';
            const buildNumber = '${{ needs.prepare-test-build.outputs.build_number }}';
            const version = '${{ needs.prepare-test-build.outputs.version }}';
            const branchName = '${{ needs.prepare-test-build.outputs.branch_name }}';
            const issueNumber = '${{ needs.prepare-test-build.outputs.issue_number }}';
            const runId = '${{ github.run_id }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            const now = Date.now();

            // 빌드 단계 소요 시간 (step1 종료 ~ 현재)
            let step2ElapsedStr = '-';
            if (step1EndTime > 0) {
              const step2_s = Math.round((now - step1EndTime) / 1000);
              const s2Min = Math.floor(step2_s / 60);
              const s2Sec = step2_s % 60;
              step2ElapsedStr = s2Min > 0 ? `${s2Min}분 ${s2Sec}초` : `${s2Sec}초`;
            }

            // 총 소요 시간
            const total_s = Math.round((now - startTime) / 1000);
            const tMin = Math.floor(total_s / 60);
            const tSec = total_s % 60;
            const totalElapsed = tMin > 0 ? `${tMin}분 ${tSec}초` : `${tSec}초`;

            const body = [
              '## 🍎 ❌ iOS TestFlight 빌드 실패',
              '',
              '| 단계 | 상태 | 소요 시간 |',
              '|------|------|----------|',
              `| 🔧 준비 | ✅ 완료 | ${step1Elapsed || '-'} |`,
              `| 🔨 IPA 빌드 | ❌ 실패 | ${step2ElapsedStr} |`,
              '| 📤 TestFlight 배포 | ⏸️ 건너뜀 | - |',
              '',
              `- 앱 버전: \`${version}(${buildNumber})\``,
              `- 브랜치: \`${branchName}\``,
              `- 총 소요 시간: ${totalElapsed}`,
              '',
              '❌ 빌드 중 오류가 발생했습니다.',
              '',
              `🔗 **[워크플로우 실행 로그 확인](${runUrl})**`
            ].join('\n');

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              body: body
            });

            console.log(`❌ 진행상황: IPA 빌드 실패 (${totalElapsed})`);

            if (issueNumber && issueNumber !== '' && parseInt(issueNumber) !== prNumber) {
              const issueBody = [
                '🍎 ❌ **iOS TestFlight 빌드 실패**',
                '',
                `- 앱 버전: \`${version}(${buildNumber})\``,
                '',
                '❌ 빌드 중 오류가 발생했습니다.',
                '',
                `🔗 **[워크플로우 실행 로그 확인](${runUrl})**`
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(issueNumber),
                body: issueBody
              });
              console.log(`❌ 이슈 #${issueNumber}에도 빌드 실패 댓글 작성 완료`);
            }

  deploy-testflight-test:
    name: TestFlight 테스트 배포
    runs-on: macos-26
    needs: [prepare-test-build, build-ios-test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.branch_name || github.ref }}

      # App Store Connect API Key 설정
      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      # IPA 파일 다운로드
      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: ios/build/ipa/

      # 릴리즈 노트 다운로드
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      # Install and setup Fastlane (Bundler 방식으로 CFPropertyList 의존성 충돌 방지)
      - name: Install Fastlane and create Fastfile
        working-directory: ios
        run: |
          printf 'source "https://rubygems.org"\ngem "fastlane"\n' > Gemfile
          bundle install
          mkdir -p fastlane
          cat > fastlane/Fastfile << 'EOF'
          default_platform(:ios)

          platform :ios do
            lane :upload_testflight do
              api_key = app_store_connect_api_key(
                key_id: ENV["APP_STORE_CONNECT_API_KEY_ID"],
                issuer_id: ENV["APP_STORE_CONNECT_ISSUER_ID"],
                key_filepath: ENV["API_KEY_PATH"]
              )
          
              # 업로드 + 암호화 규정 자동 설정
              pilot(
                api_key: api_key,
                ipa: ENV["IPA_PATH"],
                changelog: ENV["RELEASE_NOTES"],
                skip_waiting_for_build_processing: true,  # 빠르게 업로드만
                distribute_external: false,
                notify_external_testers: false,
                uses_non_exempt_encryption: false  # 암호화 규정 자동 설정
              )
          
              puts "✅ TESTFLIGHT 자동 업로드 완료!"
            end
          end
          EOF

      # Upload to TestFlight with Fastlane
      - name: Upload to TestFlight with Fastlane
        run: |
          # 절대 경로로 IPA 파일 찾기
          IPA_PATH=$(find $GITHUB_WORKSPACE/ios/build/ipa -name "*.ipa" | head -1)
          echo "Found IPA at: $IPA_PATH"

          if [ ! -f "$IPA_PATH" ]; then
            echo "❌ IPA 파일을 찾을 수 없습니다!"
            echo "빌드 디렉토리 내용:"
            ls -la ios/build/ipa/
            exit 1
          fi

          # Release notes 준비
          if [ -f "final_release_notes.txt" ]; then
            RELEASE_NOTES=$(cat final_release_notes.txt)
            echo "Release Notes 포함하여 업로드:"
            echo "$RELEASE_NOTES"
          else
            RELEASE_NOTES="테스트 빌드 #${{ needs.prepare-test-build.outputs.build_number }}"
            echo "기본 Release Notes로 업로드: $RELEASE_NOTES"
          fi

          # 환경변수 설정
          export APP_STORE_CONNECT_API_KEY_ID="${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}"
          export APP_STORE_CONNECT_ISSUER_ID="${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
          export API_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8"
          export IPA_PATH="$IPA_PATH"
          export RELEASE_NOTES="$RELEASE_NOTES"

          # 디버깅 정보
          echo "Working directory: $(pwd)"
          echo "IPA_PATH: $IPA_PATH"
          echo "API_KEY_PATH: $API_KEY_PATH"

          # Fastlane 실행
          cd ios
          bundle exec fastlane upload_testflight || echo "⚠️ 권한 에러 발생했지만 업로드는 성공적으로 완료됨"

      # TestFlight 배포 완료 - PR 댓글 업데이트
      - name: TestFlight 배포 완료 - 댓글 업데이트
        if: success() && github.event_name == 'repository_dispatch' && needs.prepare-test-build.outputs.progress_comment_id != ''
