# ===================================================================
# Android 테스트용 APK 빌드 워크플로우
# ===================================================================
#
# 이 워크플로우는 test-deploy 브랜치에서 수동으로 실행하여
# 테스트용 Android APK를 빌드합니다.
#
# 주요 특징:
# - workflow_dispatch로 수동 실행만 가능
# - 버전 관리 불필요 (안드로이드는 버전 제약 없음)
# - 브랜치명에서 이슈 번호 자동 추출 (YYYYMMDD_#이슈번호_내용 형식)
# - GitHub API로 이슈 정보 가져와서 빌드 정보에 포함
# - APK 파일만 생성 (Play Store 배포 제거)
# - 아티팩트로 업로드하여 다운로드 가능 (최대 500MB/아티팩트)
# - Firebase App Distribution 연동 (FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 시크릿 있을 때)
#
# 브랜치명 예시:
# - 20251208_#387_내용
# - 20250115_#123_버그수정
#
# 사용 방법:
# 1. test-deploy 브랜치로 체크아웃
# 2. GitHub Actions에서 "ROMROM-ANDROID-TEST-APK" 워크플로우 선택
# 3. "Run workflow" 버튼 클릭
# 4. 빌드 완료 후 아티팩트에서 APK 다운로드
#
# 아티팩트 용량 제한:
# - 무료 플랜: 500MB/아티팩트, 10GB/저장소 전체
# - APK 파일은 보통 50-200MB이므로 무료 플랜으로 충분
#
# ===================================================================

name: ROMROM-ANDROID-TEST-APK

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-android-app]

env:
  FLUTTER_VERSION: "3.35.5"
  JAVA_VERSION: "17"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FIREBASE_APP_ID: "1:905325245238:android:86db75164e0df29a1f3997"
  FIREBASE_TESTER_GROUP: "romrom"

jobs:
  prepare-test-build:
    name: 테스트 빌드 준비
    runs-on: ubuntu-latest

    outputs:
      issue_url: ${{ steps.issue_info.outputs.issue_url }}
      issue_title: ${{ steps.issue_info.outputs.issue_title }}
      issue_number: ${{ steps.issue_info.outputs.issue_number }}
      branch_name: ${{ steps.issue_info.outputs.branch_name }}
      commit_hash: ${{ steps.build_info.outputs.commit_hash }}
      pr_number: ${{ steps.build_info.outputs.pr_number }}
      build_number: ${{ steps.build_info.outputs.build_number }}
      version: ${{ steps.build_info.outputs.version }}
      progress_comment_id: ${{ steps.progress_comment.outputs.comment_id }}
      progress_start_time: ${{ steps.progress_comment.outputs.start_time }}
      firebase_available: ${{ steps.firebase_check.outputs.available }}

    steps:
      # Firebase 시크릿 존재 여부 확인 (워크플로우 시작 시 바로 판단)
      - name: Check Firebase credentials
        id: firebase_check
        run: |
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "✅ Firebase 서비스 계정 감지 - App Distribution 업로드 예정"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️ Firebase 서비스 계정 없음 - App Distribution 업로드 건너뜀"
          fi

      # 트리거 즉시 진행상황 댓글 생성 (모든 준비 작업 전에 먼저 댓글 달기)
      - name: 진행상황 댓글 생성
        id: progress_comment
        if: github.event_name == 'repository_dispatch' && github.event.client_payload.pr_number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt('${{ github.event.client_payload.pr_number }}');
            const runId = '${{ github.run_id }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;
            const startTime = Date.now();
            const firebaseAvailable = '${{ steps.firebase_check.outputs.available }}' === 'true';

            const rows = [
              '| 🔧 준비 | ⏳ 진행 중... | - |',
              '| 🔨 APK 빌드 | ⏸️ 대기 | - |',
              '| 📤 GitHub 아티팩트 업로드 | ⏸️ 대기 | - |',
            ];
            if (firebaseAvailable) {
              rows.push('| 🔥 Firebase App Distribution | ⏸️ 대기 | - |');
            }

            const body = [
              '## 🤖 Android APK 빌드 중...',
              '',
              '| 단계 | 상태 | 소요 시간 |',
              '|------|------|----------|',
              ...rows,
              '',
              `📋 **[실시간 로그 보기](${runUrl})**`
            ].join('\n');

            const { data: comment } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });

            console.log(`✅ 진행상황 댓글 생성 완료 (ID: ${comment.id})`);
            core.setOutput('comment_id', comment.id.toString());
            core.setOutput('start_time', startTime.toString());

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.branch_name || github.ref }}

      - name: Pull latest changes
        run: |
          BRANCH_NAME="${{ github.event_name == 'repository_dispatch' && github.event.client_payload.branch_name || github.ref_name }}"
          echo "🌿 브랜치: $BRANCH_NAME"
          git pull origin "$BRANCH_NAME" || echo "⚠️ Pull 실패 (이미 최신 상태일 수 있음)"

      # 브랜치명에서 이슈 번호 추출 및 GitHub API로 이슈 정보 가져오기
      - name: 브랜치명에서 이슈 정보 추출
        id: issue_info
        run: |
          # repository_dispatch인 경우 client_payload에서 브랜치명 가져오기
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            BRANCH_NAME="${{ github.event.client_payload.branch_name }}"
            ISSUE_NUMBER="${{ github.event.client_payload.issue_number }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
            # 브랜치명에서 이슈 번호 추출 (#387 형식) - sed 사용 (Linux/macOS 호환)
            ISSUE_NUMBER=$(echo "$BRANCH_NAME" | sed -n 's/.*#\([0-9]*\).*/\1/p')
          fi

          echo "🌿 브랜치명: $BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "⚠️ 브랜치명에서 이슈 번호를 찾을 수 없습니다."
            echo "issue_url=" >> $GITHUB_OUTPUT
            echo "issue_title=" >> $GITHUB_OUTPUT
            echo "issue_number=" >> $GITHUB_OUTPUT
          else
            echo "✅ 추출된 이슈 번호: #$ISSUE_NUMBER"
            ISSUE_URL="https://github.com/${{ github.repository }}/issues/$ISSUE_NUMBER"
            echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT
            echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT

            # GitHub API로 이슈 정보 가져오기
            echo "🔍 GitHub API로 이슈 정보 조회 중..."
            ISSUE_RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER")

            # 이슈 제목 추출
            ISSUE_TITLE=$(echo "$ISSUE_RESPONSE" | jq -r '.title // "이슈 정보 없음"')

            # 이슈 상태 확인
            ISSUE_STATE=$(echo "$ISSUE_RESPONSE" | jq -r '.state // "unknown"')

            if [ "$ISSUE_TITLE" = "null" ] || [ "$ISSUE_TITLE" = "이슈 정보 없음" ]; then
              echo "⚠️ 이슈 #$ISSUE_NUMBER를 찾을 수 없습니다."
              echo "issue_title=" >> $GITHUB_OUTPUT
            else
              echo "📋 이슈 제목: $ISSUE_TITLE"
              echo "📌 이슈 상태: $ISSUE_STATE"
              echo "issue_title=$ISSUE_TITLE" >> $GITHUB_OUTPUT
            fi
          fi

      # 빌드 정보 생성
      - name: 빌드 정보 생성
        id: build_info
        run: |
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHORT=$(echo "$COMMIT_SHA" | cut -c1-7)
          BUILD_DATE=$(date '+%Y-%m-%d %H:%M:%S')
          
          # repository_dispatch 이벤트인 경우 PR 번호를 빌드 번호로 사용
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            BUILD_NUMBER="${{ github.event.client_payload.build_number }}"
            PR_NUMBER="${{ github.event.client_payload.pr_number }}"
            echo "📋 repository_dispatch 이벤트 감지"
            echo "  PR 번호: #$PR_NUMBER"
            echo "  빌드 번호: $BUILD_NUMBER (PR 번호 사용)"
          else
            BUILD_NUMBER="${{ github.run_number }}"
            PR_NUMBER=""
            echo "📋 workflow_dispatch 이벤트 감지"
            echo "  빌드 번호: $BUILD_NUMBER (기본값)"
          fi
          
          VERSION=$(grep '^version:' version.yml | sed 's/version:[[:space:]]*//' | tr -d '"')
          echo "commit_hash=$COMMIT_SHORT" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          echo "📋 빌드 정보:"
          echo "  빌드 번호: #$BUILD_NUMBER"
          if [ -n "$PR_NUMBER" ]; then
            echo "  PR 번호: #$PR_NUMBER"
          fi
          echo "  커밋 해시: $COMMIT_SHORT"
          echo "  빌드 날짜: $BUILD_DATE"

  build-android-test:
    name: Android 테스트 APK 빌드
    runs-on: ubuntu-latest
    needs: prepare-test-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.branch_name || github.ref }}

      # Debug Keystore 설정
      - name: Setup Debug Keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE }}" | base64 -d > ~/.android/debug.keystore || echo "Base64 decoding failed"
          echo "Debug Keystore created (for debugging)"
          ls -la ~/.android/

      # .env 파일 생성
      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "TEST_BUILD=true" >> .env
          echo ".env file created"

      # Keystore와 key.properties 설정
      - name: Setup Keystore and key.properties
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.DEBUG_KEYSTORE }}" | base64 -d > android/app/keystore/key.jks || echo "Base64 decoding failed"
          echo "Keystore created from DEBUG_KEYSTORE"
          ls -la android/app/keystore
          echo "storeFile=keystore/key.jks" > android/key.properties
          echo "storePassword=android" >> android/key.properties
          echo "keyAlias=androiddebugkey" >> android/key.properties
          echo "keyPassword=android" >> android/key.properties
          echo "key.properties created"
          ls -la android/

      # google-services.json 생성
      - name: Create google-services.json
        shell: bash
        run: |
          mkdir -p android/app
          printf '%s' "${GOOGLE_SERVICES_JSON}" > android/app/google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      # Flutter 설정
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Verify Flutter version
        run: |
          echo "Flutter setup completed"
          flutter --version

      # Flutter 및 Gradle 캐시
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-flutter-pub-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 프로젝트 의존성 설치
      - name: Install dependencies
        run: |
          flutter pub get
          echo "Dependencies installed"

      # Gradle 셋업
      - name: Setup Gradle
        working-directory: android
        run: |
          chmod +x gradlew
          echo "Gradle wrapper permissions set"

      # Java 설정
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Verify Java version
        run: |
          echo "Java setup completed"
          java -version

      # Android SDK 설정
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify Android SDK setup
        run: echo "Android SDK setup completed"

      # Ruby 설정
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Verify Ruby version
        run: |
          echo "Ruby setup completed"
          ruby -v

      # Fastlane 설치 (Bundler 방식으로 CFPropertyList 의존성 충돌 방지)
      - name: Install Fastlane
        working-directory: android
        run: |
          printf 'source "https://rubygems.org"\ngem "fastlane"\n' > Gemfile
          bundle install
          echo "Fastlane installed"
          bundle exec fastlane --version

      # 진행상황 - 준비 완료
      - name: 진행상황 - 준비 완료
        id: progress_step1
        if: github.event_name == 'repository_dispatch' && needs.prepare-test-build.outputs.progress_comment_id != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commentId = parseInt('${{ needs.prepare-test-build.outputs.progress_comment_id }}');
            const startTime = parseInt('${{ needs.prepare-test-build.outputs.progress_start_time }}');
            const runId = '${{ github.run_id }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            const now = Date.now();
            const elapsed = Math.round((now - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            const elapsedStr = minutes > 0 ? `${minutes}분 ${seconds}초` : `${seconds}초`;
            const firebaseAvailable = '${{ needs.prepare-test-build.outputs.firebase_available }}' === 'true';

            const rows = [
              `| 🔧 준비 | ✅ 완료 | ${elapsedStr} |`,
              '| 🔨 APK 빌드 | ⏳ 진행 중... | - |',
              '| 📤 GitHub 아티팩트 업로드 | ⏸️ 대기 | - |',
            ];
            if (firebaseAvailable) {
              rows.push('| 🔥 Firebase App Distribution | ⏸️ 대기 | - |');
            }

            const body = [
              '## 🤖 Android APK 빌드 중...',
              '',
              '| 단계 | 상태 | 소요 시간 |',
              '|------|------|----------|',
              ...rows,
              '',
              `📋 **[실시간 로그 보기](${runUrl})**`
            ].join('\n');

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              body: body
            });

            console.log(`✅ 진행상황 업데이트: 준비 완료 (${elapsedStr})`);
            core.setOutput('elapsed', elapsedStr);
            core.setOutput('end_time', now.toString());

      # APK 파일명 생성
      - name: Generate APK filename
        id: apk_filename
        run: |
          COMMIT_SHORT="${{ needs.prepare-test-build.outputs.commit_hash }}"
          BUILD_NUMBER="${{ needs.prepare-test-build.outputs.build_number }}"
          APK_NAME="romrom-test-${BUILD_NUMBER}-${COMMIT_SHORT}.apk"
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "📦 APK 파일명: $APK_NAME"

      # 테스트 빌드 버전 설정 (version.yml 실제 버전 사용 - 빌드번호는 PR/이슈 번호 기반)
      - name: Set test build version
        run: |
          BUILD_NUMBER="${{ needs.prepare-test-build.outputs.build_number }}"
          VERSION=$(grep '^version:' version.yml | sed 's/version:[[:space:]]*//' | tr -d '"')
          echo "📋 테스트 빌드 버전 설정: ${VERSION}+${BUILD_NUMBER}"
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
          echo "✅ pubspec.yaml 버전 변경 완료:"
          grep "^version:" pubspec.yaml

      # Fastlane을 이용하여 APK 빌드
      - name: Build APK with Fastlane
        working-directory: android
        run: |
          bundle exec fastlane build --verbose
          ls -la ../build/app/outputs/flutter-apk/ || true
          echo "APK built with Fastlane"

      # APK 파일 이름 변경 및 준비
      - name: Rename and Prepare APK
        run: |
          mkdir -p ./android/app/build/outputs/apk/release/
          APK_NAME="${{ steps.apk_filename.outputs.apk_name }}"
          mv ./build/app/outputs/flutter-apk/app-release.apk ./android/app/build/outputs/apk/release/${APK_NAME}
          echo "APK renamed to ${APK_NAME}"
          ls -la ./android/app/build/outputs/apk/release/

          # APK 파일 크기 확인
          APK_SIZE=$(stat -c%s "./android/app/build/outputs/apk/release/${APK_NAME}" 2>/dev/null || stat -f%z "./android/app/build/outputs/apk/release/${APK_NAME}" 2>/dev/null || echo "0")
          APK_SIZE_MB=$(echo "scale=2; $APK_SIZE / 1024 / 1024" | bc)
          echo "📦 APK 파일 크기: ${APK_SIZE_MB}MB"

          # 아티팩트 용량 제한 확인 (500MB)
          if [ "$APK_SIZE" -gt 524288000 ]; then
            echo "⚠️ 경고: APK 파일 크기가 500MB를 초과합니다 (${APK_SIZE_MB}MB)"
          else
            echo "✅ APK 파일 크기가 아티팩트 제한 내입니다 (${APK_SIZE_MB}MB / 500MB)"
          fi

      # 진행상황 - APK 빌드 완료
      - name: 진행상황 - APK 빌드 완료
        id: progress_step2
        if: github.event_name == 'repository_dispatch' && needs.prepare-test-build.outputs.progress_comment_id != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commentId = parseInt('${{ needs.prepare-test-build.outputs.progress_comment_id }}');
            const step1EndTime = parseInt('${{ steps.progress_step1.outputs.end_time }}');
            const step1Elapsed = '${{ steps.progress_step1.outputs.elapsed }}';
            const runId = '${{ github.run_id }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            const now = Date.now();
            const elapsed = Math.round((now - step1EndTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            const elapsedStr = minutes > 0 ? `${minutes}분 ${seconds}초` : `${seconds}초`;
            const firebaseAvailable = '${{ needs.prepare-test-build.outputs.firebase_available }}' === 'true';

            const rows = [
              `| 🔧 준비 | ✅ 완료 | ${step1Elapsed || '-'} |`,
              `| 🔨 APK 빌드 | ✅ 완료 | ${elapsedStr} |`,
              '| 📤 GitHub 아티팩트 업로드 | ⏳ 진행 중... | - |',
            ];
            if (firebaseAvailable) {
              rows.push('| 🔥 Firebase App Distribution | ⏸️ 대기 | - |');
            }

            const body = [
              '## 🤖 Android APK 빌드 중...',
              '',
              '| 단계 | 상태 | 소요 시간 |',
              '|------|------|----------|',
              ...rows,
              '',
              `📋 **[실시간 로그 보기](${runUrl})**`
            ].join('\n');

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              body: body
            });

            console.log(`✅ 진행상황 업데이트: APK 빌드 완료 (${elapsedStr})`);
            core.setOutput('elapsed', elapsedStr);
            core.setOutput('end_time', now.toString());

      # 빌드 정보 파일 생성
      - name: Create build info file
        run: |
          BUILD_NUMBER="${{ needs.prepare-test-build.outputs.build_number }}"
          PR_NUMBER="${{ needs.prepare-test-build.outputs.pr_number }}"
          BRANCH_NAME="${{ github.event_name == 'repository_dispatch' && github.event.client_payload.branch_name || github.ref_name }}"
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHORT="${{ needs.prepare-test-build.outputs.commit_hash }}"
          BUILD_DATE=$(date '+%Y-%m-%d %H:%M:%S')
          
          cat > build-info.txt << EOF
          테스트 APK 빌드 정보
          
          빌드 번호: #$BUILD_NUMBER
          EOF
          
          if [ -n "$PR_NUMBER" ]; then
            cat >> build-info.txt << EOF
          PR 번호: #$PR_NUMBER
          EOF
          fi
          
          cat >> build-info.txt << EOF
          브랜치: $BRANCH_NAME
          커밋: $COMMIT_SHORT
          전체 커밋 해시: $COMMIT_SHA
          빌드 날짜: $BUILD_DATE
          
          EOF
          
          # 이슈 정보가 있으면 추가
          if [ -n "${{ needs.prepare-test-build.outputs.issue_number }}" ]; then
            ISSUE_NUMBER="${{ needs.prepare-test-build.outputs.issue_number }}"
            ISSUE_TITLE="${{ needs.prepare-test-build.outputs.issue_title }}"
            ISSUE_URL="${{ needs.prepare-test-build.outputs.issue_url }}"
          
            cat >> build-info.txt << EOF
          관련 이슈:
          - #$ISSUE_NUMBER: $ISSUE_TITLE
          - URL: $ISSUE_URL
          
          EOF
          fi
          
          echo "📋 빌드 정보 파일 생성 완료:"
          cat build-info.txt

      # 빌드 메타데이터 파일 생성 (댓글 작성 워크플로우용)
      - name: Create build metadata file
        run: |
          cat > build-metadata.json << EOF
          {
            "pr_number": "${{ needs.prepare-test-build.outputs.pr_number }}",
            "build_number": "${{ needs.prepare-test-build.outputs.build_number }}",
            "issue_number": "${{ needs.prepare-test-build.outputs.issue_number }}",
            "branch_name": "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.branch_name || github.ref_name }}"
          }
          EOF
          cat build-metadata.json

      # APK와 빌드 정보를 아티팩트로 업로드
      - name: Upload APK and build info as Artifact
        id: upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: romrom-test-apk
          path: |
            ./android/app/build/outputs/apk/release/*.apk
            build-info.txt
            build-metadata.json
          retention-days: 7
          if-no-files-found: error

      # 아티팩트 업로드 완료 시간 기록
      - name: Record artifact upload time
        id: artifact_time
        if: github.event_name == 'repository_dispatch' && needs.prepare-test-build.outputs.progress_comment_id != ''
        uses: actions/github-script@v7
        with:
          script: |
            const step2EndTime = parseInt('${{ steps.progress_step2.outputs.end_time }}');
            const now = Date.now();
            const elapsed = Math.round((now - step2EndTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            const elapsedStr = minutes > 0 ? `${minutes}분 ${seconds}초` : `${seconds}초`;
            core.setOutput('elapsed', elapsedStr);
            core.setOutput('end_time', now.toString());

      # Firebase App Distribution 업로드 (prepare-test-build에서 시크릿 존재 확인 완료)
      - name: Setup Firebase credentials file
        if: needs.prepare-test-build.outputs.firebase_available == 'true'
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 }}" | base64 --decode > firebase-service-account.json
          echo "✅ Firebase 서비스 계정 JSON 파일 생성 완료"

      - name: Upload to Firebase App Distribution
        id: firebase_upload
        if: needs.prepare-test-build.outputs.firebase_available == 'true'
        continue-on-error: true
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ env.FIREBASE_APP_ID }}
          serviceCredentialsFile: firebase-service-account.json
          groups: ${{ env.FIREBASE_TESTER_GROUP }}
          file: ./android/app/build/outputs/apk/release/${{ steps.apk_filename.outputs.apk_name }}
          releaseNotes: |
            테스트 빌드 #${{ needs.prepare-test-build.outputs.build_number }}
            브랜치: ${{ needs.prepare-test-build.outputs.branch_name }}
            커밋: ${{ needs.prepare-test-build.outputs.commit_hash }}
            이슈: #${{ needs.prepare-test-build.outputs.issue_number }} ${{ needs.prepare-test-build.outputs.issue_title }}

      - name: Cleanup Firebase credentials
        if: always() && needs.prepare-test-build.outputs.firebase_available == 'true'
        run: rm -f firebase-service-account.json

      - name: Firebase upload result
        id: firebase_result
        if: needs.prepare-test-build.outputs.firebase_available == 'true'
        run: |
          if [ "${{ steps.firebase_upload.outcome }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Firebase App Distribution 업로드 성공"
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "❌ Firebase App Distribution 업로드 실패 - APK 아티팩트는 정상 업로드됨"
          fi

      # Firebase 업로드 완료 시간 기록
      - name: Record Firebase upload time
        id: firebase_time
        if: needs.prepare-test-build.outputs.firebase_available == 'true' && github.event_name == 'repository_dispatch' && needs.prepare-test-build.outputs.progress_comment_id != ''
        uses: actions/github-script@v7
        with:
          script: |
            const artifactEndTime = parseInt('${{ steps.artifact_time.outputs.end_time }}');
            const now = Date.now();
            const elapsed = Math.round((now - artifactEndTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            const elapsedStr = minutes > 0 ? `${minutes}분 ${seconds}초` : `${seconds}초`;
            core.setOutput('elapsed', elapsedStr);

      # 진행상황 - 빌드 성공 (최종)
      - name: 진행상황 - 빌드 성공 (최종)
        if: success() && github.event_name == 'repository_dispatch' && needs.prepare-test-build.outputs.progress_comment_id != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commentId = parseInt('${{ needs.prepare-test-build.outputs.progress_comment_id }}');
            const startTime = parseInt('${{ needs.prepare-test-build.outputs.progress_start_time }}');
            const step1Elapsed = '${{ steps.progress_step1.outputs.elapsed }}';
            const step2Elapsed = '${{ steps.progress_step2.outputs.elapsed }}';
            const step3Elapsed = '${{ steps.artifact_time.outputs.elapsed }}';
            const step4Elapsed = '${{ steps.firebase_time.outputs.elapsed }}';
            const prNumber = parseInt('${{ github.event.client_payload.pr_number }}');
            const buildNumber = '${{ needs.prepare-test-build.outputs.build_number }}';
            const version = '${{ needs.prepare-test-build.outputs.version }}';
            const branchName = '${{ needs.prepare-test-build.outputs.branch_name }}';
            const commitHash = '${{ needs.prepare-test-build.outputs.commit_hash }}';
            const issueNumber = '${{ needs.prepare-test-build.outputs.issue_number }}';
            const runId = '${{ github.run_id }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            // upload-artifact@v4의 artifact-url output 사용 (직접 다운로드 URL)
            const artifactUrl = '${{ steps.upload_artifact.outputs.artifact-url }}' || `${runUrl}#artifacts`;

            const now = Date.now();

            // 총 소요 시간 (시작 ~ 현재)
            const totalElapsed_s = Math.round((now - startTime) / 1000);
            const totalMin = Math.floor(totalElapsed_s / 60);
            const totalSec = totalElapsed_s % 60;
            const totalElapsed = totalMin > 0 ? `${totalMin}분 ${totalSec}초` : `${totalSec}초`;

            const firebaseAvailable = '${{ needs.prepare-test-build.outputs.firebase_available }}' === 'true';
            const firebaseSuccess = '${{ steps.firebase_result.outputs.status }}' === 'success';

            const lines = [
              '## 🤖 ✅ Android APK 빌드 완료!',
              '',
              '| 단계 | 상태 | 소요 시간 |',
              '|------|------|----------|',
              `| 🔧 준비 | ✅ 완료 | ${step1Elapsed || '-'} |`,
              `| 🔨 APK 빌드 | ✅ 완료 | ${step2Elapsed || '-'} |`,
              `| 📤 GitHub 아티팩트 업로드 | ✅ 완료 | ${step3Elapsed || '-'} |`,
            ];

            if (firebaseAvailable) {
              if (firebaseSuccess) {
                lines.push(`| 🔥 Firebase App Distribution | ✅ 완료 | ${step4Elapsed || '-'} |`);
              } else {
                lines.push(`| 🔥 Firebase App Distribution | ❌ 실패 | ${step4Elapsed || '-'} |`);
              }
            }

            lines.push(
              '',
              '### 📦 빌드 결과',
              '| 항목 | 값 |',
              '|------|-----|',
              `| **앱 버전** | \`${version}(${buildNumber})\` |`,
              `| **브랜치** | \`${branchName}\` |`,
              `| **커밋** | \`${commitHash}\` |`,
              `| **총 소요 시간** | ${totalElapsed} |`,
              '',
            );

            if (firebaseAvailable && firebaseSuccess) {
              lines.push('🔥 **Firebase App Tester 앱에서 설치 가능합니다**');
            } else if (firebaseAvailable && !firebaseSuccess) {
              lines.push('⚠️ **Firebase 업로드 실패 - 아티팩트에서 APK를 다운로드해주세요**');
            }

            lines.push(
              `📦 **[아티팩트 다운로드](${artifactUrl})**`,
              `🔗 **[워크플로우 실행 로그](${runUrl})**`
            );

            const body = lines.join('\n');

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              body: body
            });

            console.log(`✅ 진행상황 업데이트: 빌드 성공 (총 ${totalElapsed})`);

            // PR과 연결된 이슈가 있고, PR 번호와 다른 경우에만 이슈에도 댓글
            if (issueNumber && issueNumber !== '' && parseInt(issueNumber) !== prNumber) {
              const issueLines = [
                '🤖 ✅ **Android APK 빌드 완료**',
                '',
                `- 앱 버전: \`${version}(${buildNumber})\``,
                `- 커밋: \`${commitHash}\``,
                '',
              ];

              if (firebaseAvailable && firebaseSuccess) {
                issueLines.push('🔥 **Firebase App Tester 앱에서 설치 가능합니다**');
              } else if (firebaseAvailable && !firebaseSuccess) {
                issueLines.push('⚠️ **Firebase 업로드 실패 - 아티팩트에서 APK를 다운로드해주세요**');
              }

              issueLines.push(`📦 **[아티팩트 다운로드](${artifactUrl})**`);

              const issueBody = issueLines.join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(issueNumber),
                body: issueBody
              });
              console.log(`✅ 이슈 #${issueNumber}에도 빌드 성공 댓글 작성 완료`);
            }

      # 진행상황 - 빌드 실패 (최종)
      - name: 진행상황 - 빌드 실패 (최종)
        if: failure() && github.event_name == 'repository_dispatch' && needs.prepare-test-build.outputs.progress_comment_id != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commentId = parseInt('${{ needs.prepare-test-build.outputs.progress_comment_id }}');
            const startTime = parseInt('${{ needs.prepare-test-build.outputs.progress_start_time }}');
            const step1EndTime = parseInt('${{ steps.progress_step1.outputs.end_time }}') || 0;
            const step1Elapsed = '${{ steps.progress_step1.outputs.elapsed }}';
            const prNumber = parseInt('${{ github.event.client_payload.pr_number }}');
            const buildNumber = '${{ needs.prepare-test-build.outputs.build_number }}';
            const version = '${{ needs.prepare-test-build.outputs.version }}';
            const branchName = '${{ needs.prepare-test-build.outputs.branch_name }}';
            const issueNumber = '${{ needs.prepare-test-build.outputs.issue_number }}';
            const runId = '${{ github.run_id }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            const now = Date.now();

            // 빌드 단계 소요 시간 (step1 종료 ~ 현재)
            let step2ElapsedStr = '-';
            if (step1EndTime > 0) {
              const step2_s = Math.round((now - step1EndTime) / 1000);
              const s2Min = Math.floor(step2_s / 60);
              const s2Sec = step2_s % 60;
              step2ElapsedStr = s2Min > 0 ? `${s2Min}분 ${s2Sec}초` : `${s2Sec}초`;
            }

            // 총 소요 시간
            const total_s = Math.round((now - startTime) / 1000);
            const tMin = Math.floor(total_s / 60);
            const tSec = total_s % 60;
            const totalElapsed = tMin > 0 ? `${tMin}분 ${tSec}초` : `${tSec}초`;

            const firebaseAvailable = '${{ needs.prepare-test-build.outputs.firebase_available }}' === 'true';

            const rows = [
              `| 🔧 준비 | ✅ 완료 | ${step1Elapsed || '-'} |`,
              `| 🔨 APK 빌드 | ❌ 실패 | ${step2ElapsedStr} |`,
              '| 📤 GitHub 아티팩트 업로드 | ⏸️ 건너뜀 | - |',
            ];
            if (firebaseAvailable) {
              rows.push('| 🔥 Firebase App Distribution | ⏸️ 건너뜀 | - |');
            }

            const body = [
              '## 🤖 ❌ Android APK 빌드 실패',
              '',
              '| 단계 | 상태 | 소요 시간 |',
              '|------|------|----------|',
              ...rows,
              '',
              `- 앱 버전: \`${version}(${buildNumber})\``,
              `- 브랜치: \`${branchName}\``,
              `- 총 소요 시간: ${totalElapsed}`,
              '',
              '❌ 빌드 중 오류가 발생했습니다.',
              '',
              `🔗 **[워크플로우 실행 로그 확인](${runUrl})**`
            ].join('\n');

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              body: body
            });

            console.log(`❌ 진행상황 업데이트: 빌드 실패 (${totalElapsed})`);

            // PR과 연결된 이슈가 있고, PR 번호와 다른 경우에만 이슈에도 댓글
            if (issueNumber && issueNumber !== '' && parseInt(issueNumber) !== prNumber) {
              const issueBody = [
                '🤖 ❌ **Android APK 빌드 실패**',
                '',
                `- 앱 버전: \`${version}(${buildNumber})\``,
                '',
                '❌ 빌드 중 오류가 발생했습니다.',
                '',
                `🔗 **[워크플로우 실행 로그 확인](${runUrl})**`
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(issueNumber),
                body: issueBody
              });
              console.log(`❌ 이슈 #${issueNumber}에도 빌드 실패 댓글 작성 완료`);
            }

      # 콘솔 알림 (workflow_dispatch용)
      - name: Notify Build Success (Console)
        if: success()
        run: |
          echo "✅ Android 테스트 APK 빌드 성공!"
          echo "빌드 번호: ${{ needs.prepare-test-build.outputs.build_number }}"
          echo "브랜치: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.branch_name || github.ref_name }}"
          echo "커밋: ${{ needs.prepare-test-build.outputs.commit_hash }}"
          echo "📦 아티팩트에서 APK 파일을 다운로드할 수 있습니다."

      - name: Notify on Failure (Console)
        if: failure()
        run: |
          echo "❌ Android 테스트 APK 빌드 실패!"
          echo "로그를 확인해주세요."
