<!-- 히어로 섹션 -->
<section class="snap-section hero-section w-full relative overflow-hidden">
  <div class="hero-spotlight"></div>
  <div
    class="pt-36 pb-24 px-8 sm:px-10 lg:px-16 max-w-7xl mx-auto flex flex-col lg:flex-row items-center gap-14 lg:gap-20 min-h-screen relative z-10"
  >
    <div
      class="flex-1 text-center lg:text-left z-10 flex flex-col items-center lg:items-start"
    >
      <h1
        class="text-4xl md:text-5xl lg:text-[4.5rem] font-black tracking-tightest leading-[1.25] mb-7 fade-up delay-100"
      >
        <span class="highlight-yellow">물물교환,</span><br />모든 것이<br />가치가
        되다
      </h1>
      <p
        class="text-textMuted text-base md:text-lg max-w-md leading-relaxed mb-10 font-medium fade-up delay-200"
      >
        안 쓰는 물건, 나의 재능, 현금을 자유롭게 섞어 원하는 가치와
        교환해보세요.
      </p>
      <div
        class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto fade-up delay-200"
      >
        <button
          class="js-download-trigger flex items-center justify-center gap-3 bg-surface text-textMain px-8 py-4 rounded-full font-bold text-base border border-borderLight shadow-sm hover:bg-white transition-colors whitespace-nowrap"
          data-store="appstore"
        >
          <i
            class="fa-brands fa-apple text-[22px] text-black"
            aria-hidden="true"
          ></i>
          App Store
        </button>
        <button
          class="js-download-trigger flex items-center justify-center gap-3 bg-surface text-textMain px-8 py-4 rounded-full font-bold text-base border border-borderLight shadow-sm hover:bg-white transition-colors whitespace-nowrap"
          data-store="googleplay"
        >
          <svg class="w-5 h-5" viewBox="0 0 24 24" aria-hidden="true">
            <defs>
              <linearGradient id="playGradient" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#34A853" />
                <stop offset="45%" stop-color="#4285F4" />
                <stop offset="70%" stop-color="#FBBC05" />
                <stop offset="100%" stop-color="#EA4335" />
              </linearGradient>
            </defs>
            <path d="M4 2.5L20 12L4 21.5V2.5Z" fill="url(#playGradient)" />
          </svg>
          Google Play
        </button>
      </div>
    </div>
    <div
      class="flex-1 flex justify-center lg:justify-end lg:pr-6 w-full z-10 fade-up delay-100"
    >
      <img
        src="/images/hero-mockup.png"
        alt="롬롬 앱 목업"
        data-parallax
        class="w-[85vw] max-w-[440px] lg:max-w-[640px] drop-shadow-[0_25px_60px_rgba(0,0,0,0.12)]"
      />
    </div>
  </div>
</section>
